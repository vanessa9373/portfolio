  <rect x="60" y="44" width="280" height="12" fill="#162240"/>
  <circle cx="80" cy="42" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="96" cy="42" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="112" cy="42" r="5" fill="#34d399" opacity="0.7"/>
  <!-- Code lines -->
