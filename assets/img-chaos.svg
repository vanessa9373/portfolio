<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180">
  <rect width="400" height="180" fill="#0a1628"/>
  <rect width="400" height="26" fill="#0a1f3a"/>
  <text x="200" y="17" text-anchor="middle" fill="#ef4444" font-size="10" font-family="monospace" font-weight="bold" letter-spacing="1">CHAOS ENGINEERING &amp; RESILIENCE TESTING FRAMEWORK</text>

  <!-- Normal system graph -->
  <rect x="8" y="32" width="148" height="90" rx="5" fill="#0d1f3c" stroke="#10b981" stroke-width="1.5"/>
  <text x="82" y="48" text-anchor="middle" fill="#10b981" font-size="8" font-family="monospace" font-weight="bold">NORMAL STATE</text>
  <!-- Availability graph -->
  <polyline points="18,100 32,85 46,88 60,82 74,86 88,80 102,84 116,79 130,82 144,78" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="82" y="116" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">99.99% uptime baseline</text>

  <!-- Arrow to chaos -->
  <rect x="160" y="60" width="76" height="34" rx="4" fill="#1a0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="198" y="74" text-anchor="middle" fill="#ef4444" font-size="8.5" font-family="monospace" font-weight="bold">⚡ CHAOS</text>
  <text x="198" y="86" text-anchor="middle" fill="#ef4444" font-size="7" font-family="monospace">INJECT FAULT</text>
  <polygon points="238,77 250,71 250,83" fill="#ef4444"/>
  <polygon points="158,77 146,71 146,83" fill="#ef4444"/>

  <!-- Chaos system graph -->
  <rect x="252" y="32" width="140" height="90" rx="5" fill="#0d1f3c" stroke="#ef4444" stroke-width="1.5"/>
  <text x="322" y="48" text-anchor="middle" fill="#ef4444" font-size="8" font-family="monospace" font-weight="bold">FAULT + RECOVERY</text>
  <!-- Drop and recover graph -->
  <polyline points="262,80 276,80 286,80 296,115 302,115" fill="none" stroke="#ef4444" stroke-width="2"/>
  <polyline points="302,115 308,108 314,96 320,86 326,80 336,78 350,76 364,75 378,74 388,74" fill="none" stroke="#10b981" stroke-width="2"/>
  <!-- Failure zone shading -->
  <rect x="296" y="80" width="20" height="36" fill="#ef444420"/>
  <text x="322" y="116" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">Auto-recovery validated</text>

  <!-- Fault types -->
  <rect x="8" y="130" width="85" height="42" rx="4" fill="#0d2137" stroke="#ef4444" stroke-width="1.2"/>
  <text x="50" y="147" text-anchor="middle" fill="#ef4444" font-size="12" font-family="monospace" font-weight="bold">12</text>
  <text x="50" y="160" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">FAILURE MODES</text>
  <text x="50" y="168" text-anchor="middle" fill="#475569" font-size="6" font-family="sans-serif">pod / node / network</text>

  <rect x="104" y="130" width="85" height="42" rx="4" fill="#0d2137" stroke="#10b981" stroke-width="1.2"/>
  <text x="146" y="147" text-anchor="middle" fill="#10b981" font-size="12" font-family="monospace" font-weight="bold">40%</text>
  <text x="146" y="160" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">FASTER RECOVERY</text>
  <text x="146" y="168" text-anchor="middle" fill="#475569" font-size="6" font-family="sans-serif">MTTR reduced</text>

  <rect x="200" y="130" width="95" height="42" rx="4" fill="#0d2137" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="247" y="147" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="monospace" font-weight="bold">99.99%</text>
  <text x="247" y="160" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">AVAILABILITY</text>
  <text x="247" y="168" text-anchor="middle" fill="#475569" font-size="6" font-family="sans-serif">post-hardening</text>

  <rect x="306" y="130" width="86" height="42" rx="4" fill="#0d2137" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="349" y="145" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="monospace" font-weight="bold">AWS FIS</text>
  <text x="349" y="157" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">Litmus Chaos</text>
  <text x="349" y="168" text-anchor="middle" fill="#475569" font-size="6" font-family="sans-serif">GameDay ready</text>
</svg>
