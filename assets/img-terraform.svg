<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180">
  <rect width="400" height="180" fill="#0a1628"/>
  <rect width="400" height="26" fill="#0a1f3a"/>
  <text x="200" y="17" text-anchor="middle" fill="#7c3aed" font-size="10" font-family="monospace" font-weight="bold" letter-spacing="1">REUSABLE TERRAFORM MODULE LIBRARY · 15 MODULES</text>

  <!-- Module blocks -->
  <!-- VPC Module -->
  <rect x="8" y="34" width="115" height="90" rx="4" fill="#0d1f3c" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="8" y="34" width="115" height="18" rx="4" fill="#1a0a3a"/>
  <text x="65" y="47" text-anchor="middle" fill="#a78bfa" font-size="8.5" font-family="monospace" font-weight="bold">module "vpc"</text>
  <text x="18" y="64" fill="#64748b" font-size="7" font-family="monospace">  source = "./vpc"</text>
  <text x="18" y="76" fill="#7c3aed" font-size="7" font-family="monospace">  cidr   = <tspan fill="#10b981">"10.0.0.0/16"</tspan></text>
  <text x="18" y="88" fill="#7c3aed" font-size="7" font-family="monospace">  azs    = <tspan fill="#10b981">["a","b","c"]</tspan></text>
  <text x="18" y="100" fill="#7c3aed" font-size="7" font-family="monospace">  nat_gw = <tspan fill="#f97316">true</tspan></text>
  <text x="18" y="112" fill="#64748b" font-size="7" font-family="monospace">  tags   = local.tags</text>
  <text x="122" y="112" fill="#475569" font-size="7" font-family="monospace">}</text>

  <!-- Arrow -->
  <polygon points="126,79 138,73 138,85" fill="#475569"/>

  <!-- EKS Module -->
  <rect x="140" y="34" width="115" height="90" rx="4" fill="#0d1f3c" stroke="#326ce5" stroke-width="1.5"/>
  <rect x="140" y="34" width="115" height="18" rx="4" fill="#0a1f3a"/>
  <text x="197" y="47" text-anchor="middle" fill="#60a5fa" font-size="8.5" font-family="monospace" font-weight="bold">module "eks"</text>
  <text x="150" y="64" fill="#64748b" font-size="7" font-family="monospace">  source = "./eks"</text>
  <text x="150" y="76" fill="#326ce5" font-size="7" font-family="monospace">  vpc_id = <tspan fill="#34d399">module</tspan></text>
  <text x="150" y="88" fill="#64748b" font-size="7" font-family="monospace">         .vpc.id</text>
  <text x="150" y="100" fill="#326ce5" font-size="7" font-family="monospace">  k8s_v = <tspan fill="#10b981">"1.29"</tspan></text>
  <text x="150" y="112" fill="#326ce5" font-size="7" font-family="monospace">  nodes = <tspan fill="#f97316">3</tspan></text>
  <text x="252" y="112" fill="#475569" font-size="7" font-family="monospace">}</text>

  <!-- Arrow -->
  <polygon points="258,79 270,73 270,85" fill="#475569"/>

  <!-- RDS + IAM Module -->
  <rect x="272" y="34" width="120" height="42" rx="4" fill="#0d1f3c" stroke="#ff9900" stroke-width="1.5"/>
  <rect x="272" y="34" width="120" height="18" rx="4" fill="#2a1500"/>
  <text x="332" y="47" text-anchor="middle" fill="#fbbf24" font-size="8.5" font-family="monospace" font-weight="bold">module "rds"</text>
  <text x="282" y="62" fill="#ff9900" font-size="7" font-family="monospace">  engine = <tspan fill="#10b981">"aurora"</tspan></text>
  <text x="282" y="72" fill="#ff9900" font-size="7" font-family="monospace">  multi_az = <tspan fill="#f97316">true</tspan></text>

  <rect x="272" y="82" width="120" height="42" rx="4" fill="#0d1f3c" stroke="#10b981" stroke-width="1.5"/>
  <rect x="272" y="82" width="120" height="18" rx="4" fill="#0a2a1a"/>
  <text x="332" y="95" text-anchor="middle" fill="#34d399" font-size="8.5" font-family="monospace" font-weight="bold">module "iam"</text>
  <text x="282" y="110" fill="#10b981" font-size="7" font-family="monospace">  least_priv = <tspan fill="#f97316">true</tspan></text>
  <text x="282" y="120" fill="#10b981" font-size="7" font-family="monospace">  roles = local.roles</text>

  <!-- Stats bar -->
  <rect x="8" y="136" width="88" height="36" rx="4" fill="#0d2137" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="52" y="153" text-anchor="middle" fill="#a78bfa" font-size="16" font-family="monospace" font-weight="bold">15</text>
  <text x="52" y="166" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">MODULES</text>

  <rect x="108" y="136" width="88" height="36" rx="4" fill="#0d2137" stroke="#ff9900" stroke-width="1.2"/>
  <text x="152" y="153" text-anchor="middle" fill="#ff9900" font-size="16" font-family="monospace" font-weight="bold">10+</text>
  <text x="152" y="166" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">CLIENTS</text>

  <rect x="208" y="136" width="88" height="36" rx="4" fill="#0d2137" stroke="#10b981" stroke-width="1.2"/>
  <text x="252" y="153" text-anchor="middle" fill="#10b981" font-size="16" font-family="monospace" font-weight="bold">80%</text>
  <text x="252" y="166" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">LESS PROV.</text>

  <rect x="308" y="136" width="84" height="36" rx="4" fill="#0d2137" stroke="#326ce5" stroke-width="1.2"/>
  <text x="350" y="153" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="monospace" font-weight="bold">DRY</text>
  <text x="350" y="166" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">PRINCIPLE</text>
</svg>
