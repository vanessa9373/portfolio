<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180">
  <rect width="400" height="180" fill="#0a1628"/>
  <rect width="400" height="26" fill="#0a1f3a"/>
  <text x="200" y="17" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="bold" letter-spacing="1">AUTOMATED INCIDENT RESPONSE &amp; POSTMORTEM PIPELINE</text>

  <!-- Step 1: Alert -->
  <rect x="8" y="34" width="78" height="78" rx="5" fill="#0d1f3c" stroke="#ef4444" stroke-width="1.5"/>
  <text x="47" y="52" text-anchor="middle" fill="#ef4444" font-size="8" font-family="monospace" font-weight="bold">🚨 ALERT</text>
  <rect x="14" y="58" width="66" height="12" rx="3" fill="#1a0a0a" stroke="#ef444460" stroke-width="0.8"/>
  <text x="47" y="68" text-anchor="middle" fill="#f87171" font-size="7" font-family="monospace">PagerDuty</text>
  <rect x="14" y="74" width="66" height="12" rx="3" fill="#1a0a0a" stroke="#ef444460" stroke-width="0.8"/>
  <text x="47" y="84" text-anchor="middle" fill="#f87171" font-size="7" font-family="monospace">Prometheus</text>
  <rect x="14" y="90" width="66" height="14" rx="3" fill="#1a0a0a" stroke="#ef444460" stroke-width="0.8"/>
  <text x="47" y="100" text-anchor="middle" fill="#64748b" font-size="7" font-family="monospace">SLO Breach</text>

  <polygon points="88,73 100,67 100,79" fill="#ef4444"/>

  <!-- Step 2: Triage -->
  <rect x="102" y="34" width="78" height="78" rx="5" fill="#0d1f3c" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="141" y="52" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="monospace" font-weight="bold">TRIAGE</text>
  <rect x="108" y="58" width="66" height="12" rx="3" fill="#2a1500" stroke="#fbbf2460" stroke-width="0.8"/>
  <text x="141" y="68" text-anchor="middle" fill="#fbbf24" font-size="7" font-family="monospace">Slack Notify</text>
  <rect x="108" y="74" width="66" height="12" rx="3" fill="#2a1500" stroke="#fbbf2460" stroke-width="0.8"/>
  <text x="141" y="84" text-anchor="middle" fill="#fbbf24" font-size="7" font-family="monospace">Jira Ticket</text>
  <rect x="108" y="90" width="66" height="14" rx="3" fill="#2a1500" stroke="#fbbf2460" stroke-width="0.8"/>
  <text x="141" y="100" text-anchor="middle" fill="#64748b" font-size="7" font-family="monospace">Auto-classify</text>

  <polygon points="182,73 194,67 194,79" fill="#fbbf24"/>

  <!-- Step 3: Auto-Remediate -->
  <rect x="196" y="34" width="78" height="78" rx="5" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="235" y="47" text-anchor="middle" fill="#00b4d8" font-size="7.5" font-family="monospace" font-weight="bold">AUTO-FIX</text>
  <rect x="202" y="52" width="66" height="12" rx="3" fill="#0a1f2a" stroke="#00b4d860" stroke-width="0.8"/>
  <text x="235" y="62" text-anchor="middle" fill="#00b4d8" font-size="7" font-family="monospace">Lambda Run</text>
  <rect x="202" y="68" width="66" height="12" rx="3" fill="#0a1f2a" stroke="#00b4d860" stroke-width="0.8"/>
  <text x="235" y="78" text-anchor="middle" fill="#00b4d8" font-size="7" font-family="monospace">Runbooks</text>
  <rect x="202" y="84" width="66" height="12" rx="3" fill="#0a1f2a" stroke="#00b4d860" stroke-width="0.8"/>
  <text x="235" y="94" text-anchor="middle" fill="#00b4d8" font-size="7" font-family="monospace">Rollback</text>
  <text x="235" y="108" text-anchor="middle" fill="#64748b" font-size="7" font-family="monospace">8min MTTR</text>

  <polygon points="276,73 288,67 288,79" fill="#00b4d8"/>

  <!-- Step 4: Postmortem -->
  <rect x="290" y="34" width="102" height="78" rx="5" fill="#0d1f3c" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="341" y="52" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="monospace" font-weight="bold">POSTMORTEM</text>
  <rect x="296" y="58" width="90" height="12" rx="3" fill="#1a0a2a" stroke="#a78bfa60" stroke-width="0.8"/>
  <text x="341" y="68" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">Blameless Review</text>
  <rect x="296" y="74" width="90" height="12" rx="3" fill="#1a0a2a" stroke="#a78bfa60" stroke-width="0.8"/>
  <text x="341" y="84" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">Root Cause</text>
  <rect x="296" y="90" width="90" height="14" rx="3" fill="#1a0a2a" stroke="#a78bfa60" stroke-width="0.8"/>
  <text x="341" y="100" text-anchor="middle" fill="#64748b" font-size="7" font-family="monospace">Action Items → Jira</text>

  <!-- Stats -->
  <rect x="8" y="122" width="88" height="50" rx="4" fill="#0d2137" stroke="#ef4444" stroke-width="1.2"/>
  <text x="52" y="142" text-anchor="middle" fill="#ef4444" font-size="16" font-family="monospace" font-weight="bold">70%</text>
  <text x="52" y="155" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">FEWER REPEAT</text>
  <text x="52" y="165" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">INCIDENTS</text>

  <rect x="108" y="122" width="88" height="50" rx="4" fill="#0d2137" stroke="#10b981" stroke-width="1.2"/>
  <text x="152" y="142" text-anchor="middle" fill="#10b981" font-size="16" font-family="monospace" font-weight="bold">8min</text>
  <text x="152" y="155" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">AVG MTTR</text>
  <text x="152" y="165" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">mean time to resolve</text>

  <rect x="208" y="122" width="88" height="50" rx="4" fill="#0d2137" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="252" y="142" text-anchor="middle" fill="#fbbf24" font-size="16" font-family="monospace" font-weight="bold">50%</text>
  <text x="252" y="155" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">LESS TOIL</text>
  <text x="252" y="165" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">auto-remediation</text>

  <rect x="308" y="122" width="84" height="50" rx="4" fill="#0d2137" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="350" y="139" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="monospace" font-weight="bold">Blameless</text>
  <text x="350" y="152" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="monospace">Culture</text>
  <text x="350" y="165" text-anchor="middle" fill="#475569" font-size="7" font-family="sans-serif">SRE practice</text>
</svg>
